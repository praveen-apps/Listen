<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Tube Jukebox</title>

    <link rel="manifest" href="/Listen/manifest.json">
    <meta name="theme-color" content="#F7F6F2">

    <style>
        :root {
            --bg-color: #F7F6F2;
            --card-bg: #FFFFFF;
            --text-main: #5C5C5C;
            --border-color: #E2DFD6;
            --input-bg: #FAFAFA;
            --item-hover: #F2F4F1;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --border-color: #333333;
            --input-bg: #2a2a2a;
            --item-hover: #3a3a3a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: background-color 0.4s ease;
        }

        .header-wrapper {
            position: relative;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
        }

        h1 { 
            font-weight: 300; 
            letter-spacing: -1px; 
            margin: 0; 
        }
        
        .theme-btn {
            position: absolute;
            right: 0;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 26px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sub-text { font-size: 13px; color: #888; margin-bottom: 20px; text-align: center; }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--input-bg);
            color: var(--text-main);
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus { border-color: #9575CD; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }

        button.action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.2s;
        }

        #loadBtn { background-color: #546E7A; color: white; }
        #saveBtn { background-color: #8DAA91; color: white; }
        button.action-btn:active { opacity: 0.8; }

        #videoWrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            margin-bottom: 20px;
        }

        .library-section {
            text-align: left;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .library-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; }

        #libraryList {
            max-height: 150px;
            overflow-y: auto;
        }

        .library-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--input-bg);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            border: 1px solid transparent;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .library-item:hover { border-color: #9575CD; background: var(--item-hover); }

        .item-text {
            flex-grow: 1;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            cursor: pointer;
            opacity: 0.5;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.2s, color 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
            color: #FF0000;
        }

        .status { font-size: 11px; margin-top: 10px; color: #999; height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrapper">
        <h1>Zen Tube</h1>
        <button id="themeToggle" class="theme-btn" title="Toggle Theme">☯</button>
    </div>
    <p class="sub-text">Build your personal music library.</p>

    <input type="text" id="urlInput" placeholder="Paste YouTube link here...">
    
    <div class="btn-group">
        <button id="loadBtn" class="action-btn">Play Now</button>
        <button id="saveBtn" class="action-btn">Save to Library</button>
    </div>

    <div id="videoWrapper"></div>
    <div class="status" id="statusMsg"></div>

    <div class="library-section">
        <div class="library-title">Your Library</div>
        <div id="libraryList"></div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/Listen/sw.js')
                .then(reg => console.log('SW registered!'))
                .catch(err => console.log('SW failed!', err));
        });
    }

    const urlInput = document.getElementById('urlInput');
    const loadBtn = document.getElementById('loadBtn');
    const saveBtn = document.getElementById('saveBtn');
    const videoWrapper = document.getElementById('videoWrapper');
    const libraryList = document.getElementById('libraryList');
    const statusMsg = document.getElementById('statusMsg');
    const themeToggle = document.getElementById('themeToggle');

    let rotation = 0;
    themeToggle.onclick = () => {
        rotation += 180;
        themeToggle.style.transform = `rotate(${rotation}deg)`;
        const body = document.body;
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    };

    function getID(url) {
        const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const m = url.match(reg);
        return (m && m[2].length === 11) ? m[2] : null;
    }

    function notify(text, color = "#888") {
        statusMsg.textContent = text;
        statusMsg.style.color = color;
        setTimeout(() => { statusMsg.textContent = ""; }, 3000);
    }

    loadBtn.onclick = () => {
        const id = getID(urlInput.value);
        if (!id) return notify("Invalid YouTube link", "#FF0000");

        videoWrapper.style.display = "block";
        videoWrapper.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        notify("Loading video...", "var(--text-main)");
    };

    saveBtn.onclick = () => {
        const url = urlInput.value.trim();
        const id = getID(url);
        if (!id) return notify("Nothing to save", "#FF0000");

        const item = document.createElement('div');
        item.className = 'library-item';
        item.innerHTML = `
            <div class="item-text">✦ PLAY</div>
            <button class="delete-btn" title="Remove">⛌</button>
        `;

        item.querySelector('.item-text').onclick = () => {
            urlInput.value = url;
            loadBtn.click();
        };

        item.querySelector('.delete-btn').onclick = () => {
            item.remove();
        };

        libraryList.prepend(item);
        urlInput.value = "";
        notify("Saved to library!", "var(--text-main)");
    };
</script>

</body>
</html>
